# Keeps GitHub Actions SHA pins (with their semver comments) and Cargo
# dependencies current, per project conventions.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
