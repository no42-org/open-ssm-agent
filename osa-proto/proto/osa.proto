syntax = "proto3";

// One IDL system-wide (AD-6): used at the operator edge (gRPC) and the agent
// edge (protobuf bytes in the MQTT payload). NetBox is the sole JSON/REST
// exception and is intentionally absent here.
package osa.v1;

// Envelope splits control vs stream (AD-7). Routing fields travel in cleartext
// so the untrusted broker can route (AD-9, AD-27); `ciphertext` is the
// end-to-end AES-256-GCM payload the broker can never read (AD-27).
message Envelope {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_CONTROL = 1; // handshake, dispatch, job result, session open/close, ack
    KIND_STREAM = 2;  // opaque PTY / port-forward bytes
  }

  string host_id = 1; // cleartext routing key (AD-9, AD-10)
  string sid = 2;     // cleartext session id, empty for non-session control
  uint64 seq = 3;     // cleartext monotonic sequence (AD-8); also the GCM nonce
                      // counter under the per-session, per-direction key —
                      // unique by construction, never seq-alone. See AD-27 and
                      // docs/design/aead-nonce.md.
  Kind kind = 4;      // cleartext type discriminator (AD-7)
  bytes ciphertext = 5; // AEAD-sealed payload (AD-27)
}

// Typed action descriptor (AD-12). The coordinator authorizes on this and
// routes by it, but NEVER parses the capability payload. `run_as` lives here so
// the PolicyEngine (AD-19) and the agent-local backstop (AD-20) can constrain
// privilege; `params_hash` is over a canonical byte encoding (Conventions).
message ActionDescriptor {
  string kind = 1;       // "shell" | "exec" | "inventory" | "file" | "port-forward"
  string target = 2;     // host_id
  string run_as = 3;     // target unix user
  bytes params_hash = 4; // canonical hash of the opaque params
}

// Operator-facing enrollment surface (AD-5, AD-25). The agent generates its
// keypair locally and presents a short-TTL single-use join token + CSR; the
// coordinator validates, assigns host_id, and returns a signed mTLS cert.
service Operator {
  // Mint a short-TTL single-use join token for a new host (AD-25). v1 leaves
  // this unauthenticated; operator authn/authz is added in the enforcement
  // spine (Epic 2, AD-18/AD-19).
  rpc MintToken(MintTokenRequest) returns (MintTokenResponse);
  rpc Enroll(EnrollRequest) returns (EnrollResponse);
  // Renew an existing identity before its cert expires (AD-11/AD-28). No join
  // token: the request is authenticated by the current cert + a CSR that proves
  // possession of that identity's key.
  rpc Renew(RenewRequest) returns (RenewResponse);
  // Revoke a host identity (AD-28). The host can no longer renew, so its
  // short-lived cert lapses within its TTL.
  rpc Revoke(RevokeRequest) returns (RevokeResponse);
  // Dispatch a capability action against a target host (AD-12, AD-19). The
  // coordinator authorizes the authenticated operator against the action via the
  // PolicyEngine (deny-by-default RBAC) before any agent is contacted. An
  // unauthorized dispatch is rejected PERMISSION_DENIED. v1 stubs the agent-side
  // execution — capabilities land in Epic 3+.
  rpc Dispatch(DispatchRequest) returns (DispatchResponse);
  // Export the append-only, hash-chained audit log (AD-21) for independent
  // verification (`osa audit verify` recomputes the chain client-side).
  rpc ExportAudit(ExportAuditRequest) returns (ExportAuditResponse);
}

message DispatchRequest {
  ActionDescriptor action = 1; // what to run, where, as whom (AD-12)
}

// Empty: reaching a response means the dispatch was authorized and accepted. A
// denied dispatch is a PERMISSION_DENIED status, not a response.
message DispatchResponse {}

message ExportAuditRequest {}

// One hash-chained audit entry (AD-21): hash = H(seq ‖ record ‖ prev_hash).
message AuditEntry {
  uint64 seq = 1;
  int64 ts_unix = 2;
  string subject = 3;
  string kind = 4;
  string target = 5;
  string run_as = 6;
  string decision = 7;   // "allow" | "deny"
  bytes prev_hash = 8;   // 32-byte SHA-256 of the previous entry
  bytes hash = 9;        // 32-byte SHA-256 of this entry
}

message ExportAuditResponse {
  repeated AuditEntry entries = 1; // the full chain, seq-ordered
}

message RevokeRequest {
  string host_id = 1; // identity to revoke (AD-10)
}

message RevokeResponse {}

message RenewRequest {
  bytes current_cert = 1; // the agent's current (CA-signed) cert, DER
  bytes csr = 2;          // CSR for the new cert, using the SAME keypair
}

message RenewResponse {
  bytes cert = 1; // freshly signed cert, same host_id (AD-10)
}

message MintTokenRequest {
  uint64 ttl_seconds = 1; // requested validity; the coordinator may clamp it
}

message MintTokenResponse {
  string join_token = 1;     // high-entropy single-use token
  int64 expires_at_unix = 2; // absolute expiry, unix seconds
}

message EnrollRequest {
  string join_token = 1; // short-TTL, single-use (AD-25)
  bytes csr = 2;         // agent-generated CSR; private key never leaves the host
}

message EnrollResponse {
  string host_id = 1;  // coordinator-assigned UUIDv4 (AD-10)
  bytes cert = 2;      // signed client cert, SAN = host_id (AD-11)
  bytes ca_root = 3;   // pinned CA root delivered in the join bundle (AD-25)
}
