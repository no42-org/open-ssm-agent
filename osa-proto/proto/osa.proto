syntax = "proto3";

// One IDL system-wide (AD-6): used at the operator edge (gRPC) and the agent
// edge (protobuf bytes in the MQTT payload). NetBox is the sole JSON/REST
// exception and is intentionally absent here.
package osa.v1;

// Envelope splits control vs stream (AD-7). Routing fields travel in cleartext
// so the untrusted broker can route (AD-9, AD-27); `ciphertext` is the
// end-to-end AES-256-GCM payload the broker can never read (AD-27).
message Envelope {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_CONTROL = 1; // handshake, dispatch, job result, session open/close, ack
    KIND_STREAM = 2;  // opaque PTY / port-forward bytes
  }

  string host_id = 1; // cleartext routing key (AD-9, AD-10)
  string sid = 2;     // cleartext session id, empty for non-session control
  uint64 seq = 3;     // cleartext monotonic sequence (AD-8); also the GCM nonce
                      // counter under the per-session, per-direction key —
                      // unique by construction, never seq-alone. See AD-27 and
                      // docs/design/aead-nonce.md.
  Kind kind = 4;      // cleartext type discriminator (AD-7)
  bytes ciphertext = 5; // AEAD-sealed payload (AD-27)
}

// Authenticated session handshake (AD-27, #20), per
// docs/design/session-handshake.md. Carried as **cleartext** protobuf on the
// per-host handshake topics (`…/up/hs`, `…/down/hs`) — the handshake establishes
// the seal's keys, so its own messages cannot be sealed; they are authenticated
// by the ECDSA P-256 signatures and bound to a fresh per-session `sid`.
message ClientHello {
  string sid = 1;       // fresh, unique per-session id (CSPRNG, the caller's job)
  bytes client_eph = 2; // 32-byte X25519 ephemeral public key
  bytes cert_der = 3;   // the agent's CA-signed cert (identity + chain to verify)
  bytes sig = 4;        // ECDSA P-256(agent key) over the client transcript
}

// Coordinator's reply to a ClientHello (see ClientHello).
message ServerHello {
  string sid = 1;       // echoes the ClientHello sid
  bytes server_eph = 2; // 32-byte X25519 ephemeral public key
  bytes sig = 3;        // ECDSA P-256(CA key) over the server transcript
}

// Typed action descriptor (AD-12). The coordinator authorizes on this and
// routes by it, but NEVER parses the capability payload. `run_as` lives here so
// the PolicyEngine (AD-19) and the agent-local backstop (AD-20) can constrain
// privilege; `params_hash` is over a canonical byte encoding (Conventions).
message ActionDescriptor {
  string kind = 1;       // "shell" | "exec" | "inventory" | "file" | "port-forward"
  string target = 2;     // host_id
  string run_as = 3;     // target unix user
  bytes params_hash = 4; // canonical hash of the opaque params
}

// Coordinator → agent, **sealed** on `…/down/dispatch` (#20, Epic 3). The
// coordinator authorizes/audits on the ActionDescriptor and seals the OPAQUE
// `params` here without parsing them (capability-agnostic, AD-12). The agent
// selects the capability by `kind`. Within a session, a replayed dispatch is
// rejected by the envelope's monotonic seq; `job_id`-keyed idempotency across
// reconnects (AD-22) is deferred to story 3.3.
message Dispatch {
  string job_id = 1;   // idempotency / result-correlation key (AD-22; dedup in 3.3)
  string kind = 2;     // capability selector, e.g. "exec"
  string run_as = 3;   // the authorized target unix user (AD-19/AD-20)
  bytes params = 4;    // opaque capability params (ExecParams for exec)
}

// The exec capability's params — the agent decodes these; the coordinator never
// does. `argv[0]` is the program, the rest its arguments (no shell).
message ExecParams {
  repeated string argv = 1;
}

// The shell capability's params (Epic 4, CAP-3). Carried in a `Dispatch` with
// `kind = "shell"`; the `Dispatch.job_id` doubles as the **stream_id** that keys
// the per-stream AEAD subkey. The agent decodes these to size the PTY; the
// coordinator never parses them (capability-agnostic, AD-12).
message ShellParams {
  uint32 rows = 1; // initial terminal rows
  uint32 cols = 2; // initial terminal columns
}

// One frame of an interactive stream (Epic 4), the **sealed** payload of a
// `KIND_STREAM` envelope on `…/up|down/stream`. Both directions share this shape:
// operator→host keystrokes downlink, host→operator terminal output uplink. `eof`
// (with empty `data`) is the terminal frame — the agent sends it when the shell
// exits, the coordinator sends it to close the session.
message StreamFrame {
  bytes data = 1;
  bool eof = 2;
}

// Agent → coordinator, **sealed** on `…/up/result` (#20, Epic 3). A job streams
// many `OutputChunk`s in order followed by exactly one terminal `JobOutcome`.
message JobResult {
  string job_id = 1;
  oneof body {
    OutputChunk chunk = 2;
    JobOutcome outcome = 3;
  }
}

// One ordered slice of a job's output.
message OutputChunk {
  enum Stream {
    STREAM_UNSPECIFIED = 0;
    STDOUT = 1;
    STDERR = 2;
  }
  Stream stream = 1;
  bytes data = 2;
}

// A job's terminal status: exactly one of exited / signaled / failed.
message JobOutcome {
  oneof terminal {
    int32 exit_code = 1; // normal exit
    int32 signal = 2;    // killed by a signal
    string error = 3;    // the job could not run (typed capability error, rendered)
  }
  bool output_truncated = 4; // the output byte-cap was hit
  bool timed_out = 5;        // the execution deadline was hit
}

// Agent-facing enrollment surface (AD-25). These RPCs carry their **own**
// authentication — a single-use join token (Enroll) or the current cert + a CSR
// proving key possession (Renew) — so they are NOT behind the operator OIDC/JWT
// gate (AD-18); an enrolling agent has no operator token. Kept a separate
// service from `Operator` precisely so the interceptor can gate one and not the
// other.
service Enrollment {
  // Redeem a single-use join token + CSR. The agent generates its keypair
  // locally; the coordinator validates, assigns host_id, and returns a signed
  // mTLS cert + the pinned CA root (AD-25).
  rpc Enroll(EnrollRequest) returns (EnrollResponse);
  // Renew an existing identity before its cert expires (AD-11/AD-28). No join
  // token: the request is authenticated by the current cert + a CSR that proves
  // possession of that identity's key.
  rpc Renew(RenewRequest) returns (RenewResponse);
}

// Operator-facing control surface (AD-5). Every RPC here is gated by operator
// OIDC/JWT authentication (AD-18) and, for dispatch, deny-by-default RBAC
// (AD-19).
service Operator {
  // Mint a short-TTL single-use join token for a new host (AD-25).
  rpc MintToken(MintTokenRequest) returns (MintTokenResponse);
  // Revoke a host identity (AD-28). The host can no longer renew, so its
  // short-lived cert lapses within its TTL.
  rpc Revoke(RevokeRequest) returns (RevokeResponse);
  // Dispatch a capability action against a target host (AD-12, AD-19). The
  // coordinator authorizes the authenticated operator against the action via the
  // PolicyEngine (deny-by-default RBAC) before any agent is contacted. An
  // unauthorized dispatch is rejected PERMISSION_DENIED. v1 stubs the agent-side
  // execution — capabilities land in Epic 3+.
  rpc Dispatch(DispatchRequest) returns (DispatchResponse);
  // Dispatch a capability action and **stream** its output back (Epic 3, CAP-2).
  // Same authorize-then-audit as Dispatch; on allow, the coordinator seals the
  // OPAQUE `params` to the target's live session and relays the agent's sealed
  // results — output chunks in order, then one terminal outcome. PERMISSION_DENIED
  // on an unauthorized action; a terminal error event if the host is offline.
  rpc Exec(DispatchRequest) returns (stream ExecEvent);
  // Export the append-only, hash-chained audit log (AD-21) for independent
  // verification (`osa audit verify` recomputes the chain client-side).
  rpc ExportAudit(ExportAuditRequest) returns (ExportAuditResponse);
}

message DispatchRequest {
  ActionDescriptor action = 1; // what to run, where, as whom (AD-12)
  bytes params = 2;            // opaque capability params, sealed to the agent
                               // unparsed (ExecParams for exec); the coordinator
                               // authorizes on `action`, never on this (AD-12).
}

// Empty: reaching a response means the dispatch was authorized and accepted. A
// denied dispatch is a PERMISSION_DENIED status, not a response.
message DispatchResponse {}

// One streamed event of an `Exec` dispatch: output as it is produced, then a
// single terminal outcome per host (the agent's `OutputChunk`/`JobOutcome`,
// relayed). `host_id` keys the event to its host so a fan-out across a selector
// can interleave per-host results (CAP-2, story 3.4).
message ExecEvent {
  string host_id = 3;
  oneof event {
    OutputChunk chunk = 1;
    JobOutcome outcome = 2;
  }
}

message ExportAuditRequest {}

// One hash-chained audit entry (AD-21): hash = H(seq ‖ record ‖ prev_hash).
message AuditEntry {
  uint64 seq = 1;
  int64 ts_unix = 2;
  string subject = 3;
  string kind = 4;
  string target = 5;
  string run_as = 6;
  string decision = 7;   // "allow" | "deny"
  bytes prev_hash = 8;   // 32-byte SHA-256 of the previous entry
  bytes hash = 9;        // 32-byte SHA-256 of this entry
}

message ExportAuditResponse {
  repeated AuditEntry entries = 1; // the full chain, seq-ordered
}

message RevokeRequest {
  string host_id = 1; // identity to revoke (AD-10)
}

message RevokeResponse {}

message RenewRequest {
  bytes current_cert = 1; // the agent's current (CA-signed) cert, DER
  bytes csr = 2;          // CSR for the new cert, using the SAME keypair
}

message RenewResponse {
  bytes cert = 1; // freshly signed cert, same host_id (AD-10)
}

message MintTokenRequest {
  uint64 ttl_seconds = 1; // requested validity; the coordinator may clamp it
}

message MintTokenResponse {
  string join_token = 1;     // high-entropy single-use token
  int64 expires_at_unix = 2; // absolute expiry, unix seconds
}

message EnrollRequest {
  string join_token = 1; // short-TTL, single-use (AD-25)
  bytes csr = 2;         // agent-generated CSR; private key never leaves the host
}

message EnrollResponse {
  string host_id = 1;  // coordinator-assigned UUIDv4 (AD-10)
  bytes cert = 2;      // signed client cert, SAN = host_id (AD-11)
  bytes ca_root = 3;   // pinned CA root delivered in the join bundle (AD-25)
}
